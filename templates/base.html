<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Schools CRM{% endblock %} — Inventors League</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #1a1a2e; }
    .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 10px 20px; border-radius: 6px; }
    .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 20px; border-bottom: 1px solid #333; margin-bottom: 10px; }
    .badge-tier-A { background: #198754; }
    .badge-tier-B { background: #0d6efd; }
    .badge-tier-C { background: #6c757d; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat-card { border-left: 4px solid; }
    .activity-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .overdue { background: #fff3cd; }
    .table th { font-size: .8rem; text-transform: uppercase; color: #6c757d; font-weight: 600; }
  </style>
</head>
<body>
<div class="d-flex">
  {% if current_user.is_authenticated %}
  <div class="sidebar d-flex flex-column p-0" style="width:220px; flex-shrink:0;">
    <div class="brand"><i class="bi bi-mortarboard-fill me-2"></i>Schools CRM</div>
    <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2 me-2"></i>Dashboard
    </a>
    <a href="{{ url_for('schools') }}" class="{% if 'school' in request.endpoint %}active{% endif %}">
      <i class="bi bi-building me-2"></i>Schools
    </a>
    <a href="{{ url_for('admin_users') }}" class="{% if request.endpoint == 'admin_users' %}active{% endif %}">
      <i class="bi bi-people me-2"></i>Users
    </a>
    <div class="mt-auto p-3 border-top border-secondary">
      <small class="text-muted d-block mb-1">{{ current_user.name }}</small>
      <a href="{{ url_for('logout') }}" class="text-muted small"><i class="bi bi-box-arrow-right me-1"></i>Log out</a>
    </div>
  </div>
  {% endif %}

  <div class="flex-grow-1 p-4" style="min-width:0;">
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
