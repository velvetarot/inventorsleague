{% extends 'base.html' %}
{% block title %}Edit Booking{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Edit Booking</h4>
  <a href="{{ url_for('booking_detail', booking_id=booking.id) }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>

<form method="post">
  <div class="row g-4">

    <!-- Left column -->
    <div class="col-lg-7">
      <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">Booking Details</h6>

        <div class="mb-3">
          <label class="form-label">Booking Type <span class="text-danger">*</span></label>
          <select name="booking_type" class="form-select" id="booking_type" required onchange="updateForm()">
            {% for t in booking_types %}
            <option {% if t==booking.booking_type %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Title / Description <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" required value="{{ booking.title }}">
        </div>

        <div class="mb-3">
          <label class="form-label">Linked School <span class="text-muted small">(optional)</span></label>
          <select name="school_id" class="form-select">
            <option value="">— No school —</option>
            {% for s in schools %}
            <option value="{{ s.id }}" {% if booking.school_id == s.id %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" id="date_label">Event Date</label>
            <input type="date" name="event_date" class="form-control" value="{{ booking.event_date.strftime('%Y-%m-%d') if booking.event_date else '' }}">
          </div>
          <div class="col-md-6" id="end_date_row">
            <label class="form-label">Last Session Date</label>
            <input type="date" name="end_date" class="form-control" value="{{ booking.end_date.strftime('%Y-%m-%d') if booking.end_date else '' }}">
          </div>
        </div>

        <div class="mb-3 mt-3">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            {% for s in booking_statuses %}
            <option {% if s==booking.status %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ booking.notes or '' }}</textarea>
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div class="col-lg-5">

      <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">Client Details</h6>
        <div class="mb-3">
          <label class="form-label">Client Name</label>
          <input type="text" name="client_name" class="form-control" value="{{ booking.client_name or '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="text" name="client_email" class="form-control" value="{{ booking.client_email or '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="text" name="client_phone" class="form-control" value="{{ booking.client_phone or '' }}">
        </div>
      </div>

      <div class="card p-4 mb-4" style="border-color:#198754">
        <h6 class="fw-bold mb-3"><i class="bi bi-calculator me-1"></i>Revenue Calculator</h6>
        <div class="row g-2 mb-2">
          <div class="col">
            <label class="form-label small">No. of Children</label>
            <input type="number" name="num_children" id="num_children" class="form-control" min="1" value="{{ booking.num_children or '' }}" oninput="calcRevenue()">
          </div>
          <div class="col" id="weeks_col">
            <label class="form-label small">No. of Weeks</label>
            <input type="number" name="num_weeks" id="num_weeks" class="form-control" min="1" value="{{ booking.num_weeks or '' }}" oninput="calcRevenue()">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small" id="price_label">Price per Child (£)</label>
          <input type="number" name="price_per_child" id="price_per_child" class="form-control" step="0.01" value="{{ booking.price_per_child or '' }}" oninput="calcRevenue()">
        </div>
        <div class="mb-3">
          <label class="form-label small">Flat Fee (£) <span class="text-muted">(overrides per-child)</span></label>
          <input type="number" name="flat_fee" id="flat_fee" class="form-control" step="0.01" value="{{ booking.flat_fee or '' }}" oninput="calcRevenue()">
        </div>
        <div class="bg-success bg-opacity-10 rounded p-3 text-center">
          <div class="text-muted small mb-1">Total Revenue</div>
          <div class="fs-2 fw-bold text-success" id="revenue_display">£{{ '{:,.0f}'.format(booking.total_revenue) }}</div>
        </div>
      </div>

      <div class="card p-4">
        <h6 class="fw-bold mb-3">Payment</h6>
        <label class="form-label small">Amount Paid (£)</label>
        <input type="number" name="amount_paid" class="form-control" step="0.01" value="{{ booking.amount_paid or '' }}" placeholder="0.00">
      </div>

    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
    <a href="{{ url_for('booking_detail', booking_id=booking.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </div>
</form>

<script>
function updateForm() {
  const type = document.getElementById('booking_type').value;
  const isClub = type === 'After School Club' || type === 'Holiday Camp';
  document.getElementById('weeks_col').style.display = isClub ? '' : 'none';
  document.getElementById('end_date_row').style.display = isClub ? '' : 'none';
  document.getElementById('price_label').textContent = isClub ? 'Price per Child per Week (£)' : 'Price per Child (£)';
  calcRevenue();
}

function calcRevenue() {
  const type = document.getElementById('booking_type').value;
  const isClub = type === 'After School Club' || type === 'Holiday Camp';
  const flatFee = parseFloat(document.getElementById('flat_fee').value) || 0;
  if (flatFee > 0) {
    document.getElementById('revenue_display').textContent = '£' + flatFee.toLocaleString('en-GB', {minimumFractionDigits: 0});
    return;
  }
  const children = parseFloat(document.getElementById('num_children').value) || 0;
  const weeks = parseFloat(document.getElementById('num_weeks')?.value) || 1;
  const price = parseFloat(document.getElementById('price_per_child').value) || 0;
  const total = isClub ? children * weeks * price : children * price;
  document.getElementById('revenue_display').textContent = '£' + total.toLocaleString('en-GB', {minimumFractionDigits: 0});
}

// Init on load
updateForm();
</script>
{% endblock %}
